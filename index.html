<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luzimar Despachante</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0b2a4a, #1f5fa5);
    color: #fff;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px 20px;
}

header h1 {
    margin: 0;
    font-size: 26px;
}

header p {
    opacity: 0.8;
}

/* BOTÃO PRINCIPAL */
.main-btn {
    background: #00c853;
    padding: 15px 25px;
    border-radius: 30px;
    border: none;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    margin-top: 20px;
}

/* CARDS */
.servicos {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 30px;
}

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 20px;
    margin: 10px;
    border-radius: 15px;
    width: 120px;
    text-align: center;
}

/* POPUP */
#consultaBox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

/* BOX */
.box {
    background: #fff;
    color: #000;
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 380px;
    text-align: center;
    animation: fade 0.3s ease;
}

@keyframes fade {
    from {transform: scale(0.9); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
}

/* RESULTADO */
.result-card {
    background: #f1f5fb;
    padding: 15px;
    border-radius: 12px;
    margin-top: 10px;
}

.title {
    background: #1f5fa5;
    color: #fff;
    padding: 8px;
    border-radius: 8px;
    font-size: 14px;
}

.total {
    font-size: 22px;
    font-weight: bold;
    margin-top: 10px;
    color: #1f5fa5;
}

/* BOTÕES */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    margin-top: 10px;
    cursor: pointer;
}

.btn-primary {
    background: #1f5fa5;
    color: #fff;
}

.btn-success {
    background: #00c853;
    color: #fff;
}

/* WHATS */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
    color: white;
    font-size: 20px;
}
</style>
</head>

<body>

<header>
    <h1>Luzimar Despachante</h1>
    <p>Consulta veicular rápida e segura</p>

    <button class="main-btn" onclick="abrirConsulta()">Consultar Veículo</button>
</header>

<div class="servicos">
    <div class="card">Transferência</div>
    <div class="card">Licenciamento</div>
    <div class="card">2ª Via</div>
</div>

<!-- POPUP -->
<div id="consultaBox">
<div class="box">

<h2>Consulta Veicular</h2>

<select id="tipoConsulta">
<option value="">Escolha a consulta</option>
<option value="Básica">Consulta Básica</option>
<option value="Pro">Consulta Pro</option>
</select>

<input type="text" id="placa" placeholder="ABC-1234">

<button class="btn btn-primary" onclick="enviarConsulta()">Consultar</button>
<button class="btn" onclick="fecharConsulta()">Fechar</button>

</div>
</div>

<a class="whatsapp" href="https://wa.me/5582991503881">💬</a>

<script>
function abrirConsulta(){
    document.getElementById("consultaBox").style.display = "flex";
}

function fecharConsulta(){
    location.reload();
}

async function enviarConsulta(){
    var placa = document.getElementById("placa").value;

    const res = await fetch("http://localhost:3000/consulta", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ placa })
    });

    const data = await res.json();

    const total = (
        parseFloat(data.debitos.multas) +
        parseFloat(data.debitos.ipva)
    ).toFixed(2);

    document.getElementById("consultaBox").innerHTML = `
    <div class="box">

        <h2>Resultado</h2>

        <div class="result-card">
            <div class="title">Débitos anuais</div>
            <p>2024: R$ ${data.debitos.anuais[0].valor}</p>
            <p>2025: R$ ${data.debitos.anuais[1].valor}</p>
            <p>2026: R$ ${data.debitos.anuais[2].valor}</p>
        </div>

        <div class="result-card">
            <div class="title">Outros débitos</div>
            <p>Multas: R$ ${data.debitos.multas}</p>
            <p>IPVA: R$ ${data.debitos.ipva}</p>
        </div>

        <div class="total">Total: R$ ${total}</div>

        <button class="btn btn-success" onclick="window.open('https://wa.me/5582991503881?text=Quero regularizar placa ${placa}')">
            Regularizar Agora
        </button>

        <button class="btn" onclick="location.reload()">Fechar</button>

    </div>
    `;
}

// máscara placa
document.addEventListener("DOMContentLoaded", () => {
    const placa = document.getElementById("placa");
    placa.addEventListener("input", (e) => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
        if(v.length > 3){
            v = v.slice(0,3) + '-' + v.slice(3,7);
        }
        e.target.value = v;
    });
});
</script>

</body>
</html>
