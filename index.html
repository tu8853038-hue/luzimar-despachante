<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luzimar Despachante</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    color: #000;
}

header {
    background: #1f5fa5;
    padding: 30px;
    text-align: center;
    color: white;
}

h1 {
    margin: 10px 0;
}

.btn {
    display: inline-block;
    padding: 15px 25px;
    background: #1f5fa5;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    margin-top: 10px;
    cursor: pointer;
    border: none;
}

.card {
    background: white;
    padding: 20px;
    margin: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.servicos {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
    color: white;
    text-decoration: none;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    text-align: center;
}
input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}
</style>
</head>

<body>

<header>
    <h1>Luzimar Despachante</h1>
    <p>Consulta veicular profissional</p>
</header>

<div style="text-align:center; margin:20px;">
    <button class="btn" onclick="abrirConsulta()">🔍 Consultar Veículo</button>
</div>

<!-- POPUP -->
<div id="consultaBox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#00000099; justify-content:center; align-items:center;">
<div class="box">

<h2>Consulta Veicular</h2>

<select id="tipoConsulta">
<option value="">Escolha a consulta</option>
<option value="Consulta Básica">Consulta Básica</option>
<option value="Consulta Pro">Consulta Pro</option>
</select>

<input type="text" id="placa" placeholder="ABC-1234" maxlength="8">

<button class="btn" onclick="enviarConsulta()">CONSULTAR</button>
<br><br>
<button onclick="fecharConsulta()">Fechar</button>

</div>
</div>

<section>
    <h2 style="text-align:center;">Serviços</h2>
    <div class="servicos">
        <div class="card">Transferência</div>
        <div class="card">Licenciamento</div>
        <div class="card">2ª Via</div>
    </div>
</section>

<a class="whatsapp" href="https://wa.me/5582991503881">💬</a>

<script>
function abrirConsulta(){
    document.getElementById("consultaBox").style.display = "flex";
}

function fecharConsulta(){
    location.reload();
}

// 🔥 FUNÇÃO CORRIGIDA COM API
async function enviarConsulta(){
    var tipo = document.getElementById("tipoConsulta").value;
    var placa = document.getElementById("placa").value;

    if(tipo === "" || placa === ""){
        alert("Preencha tudo!");
        return;
    }

    try {
        const res = await fetch("http://localhost:3000/consulta", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ placa })
        });

        const data = await res.json();

        const total = (
            parseFloat(data.debitos.multas) +
            parseFloat(data.debitos.ipva)
        ).toFixed(2);

        document.getElementById("consultaBox").innerHTML = `
        <div class="box">

            <h2 style="color:#1f5fa5;">Resumo de débitos</h2>

            <div style="background:#1f5fa5; color:#fff; padding:10px; border-radius:8px;">
                Débitos anuais
            </div>

            <table style="width:100%; margin-top:10px;">
                <tr><td>2024</td><td>R$ ${data.debitos.anuais[0].valor}</td></tr>
                <tr><td>2025</td><td>R$ ${data.debitos.anuais[1].valor}</td></tr>
                <tr><td>2026</td><td>R$ ${data.debitos.anuais[2].valor}</td></tr>
            </table>

            <div style="background:#1f5fa5; color:#fff; padding:10px; border-radius:8px; margin-top:15px;">
                Débitos eventuais
            </div>

            <table style="width:100%; margin-top:10px;">
                <tr><td>Multas</td><td>R$ ${data.debitos.multas}</td></tr>
                <tr><td>IPVA</td><td>R$ ${data.debitos.ipva}</td></tr>
            </table>

            <h3 style="margin-top:15px;">Total: R$ ${total}</h3>

            <a href="https://wa.me/5582991503881?text=Olá quero regularizar o veículo ${placa}" 
            class="btn" style="display:block; margin-top:10px;">
            Regularizar Agora
            </a>

            <button onclick="location.reload()" style="margin-top:10px;">Fechar</button>

        </div>
        `;

    } catch (erro) {
        alert("Erro ao consultar! Verifique se a API está rodando.");
    }
}

// FORMATA PLACA
document.addEventListener("DOMContentLoaded", function(){
    document.getElementById("placa").addEventListener("input", function(e){
        let value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        if(value.length > 3){
            value = value.slice(0,3) + '-' + value.slice(3,7);
        }
        e.target.value = value;
    });
});
</script>

</body>
</html>
