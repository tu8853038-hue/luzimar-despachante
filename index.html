<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luzimar Despachante</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0b2a4a, #1f5fa5);
    color: #fff;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px 20px;
}

.main-btn {
    background: #00c853;
    padding: 15px 25px;
    border-radius: 30px;
    border: none;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
}

/* POPUP */
#consultaBox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.box {
    background: #fff;
    color: #000;
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 380px;
    text-align: center;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

.btn-primary { background: #1f5fa5; color: #fff; }
.btn-success { background: #00c853; color: #fff; }

.result-card {
    background: #f1f5fb;
    padding: 15px;
    border-radius: 12px;
    margin-top: 10px;
}

.total {
    font-size: 22px;
    font-weight: bold;
    color: #1f5fa5;
}
</style>
</head>

<body>

<header>
    <h1>Luzimar Despachante</h1>
    <p>Consulta veicular rápida e segura</p>
    <button class="main-btn" onclick="abrirConsulta()">Consultar Veículo</button>
</header>

<div id="consultaBox">
<div class="box" id="conteudoBox">

<h2>Consulta Veicular</h2>

<select id="tipoConsulta">
<option value="">Escolha a consulta</option>
<option value="Básica">Consulta Básica</option>
<option value="Pro">Consulta Pro</option>
</select>

<input type="text" id="placa" placeholder="ABC-1234">

<button class="btn btn-primary" onclick="enviarConsulta()">Consultar</button>
<button class="btn" onclick="fecharConsulta()">Fechar</button>

</div>
</div>

<script>
function abrirConsulta(){
    document.getElementById("consultaBox").style.display = "flex";
}

function fecharConsulta(){
    location.reload();
}

async function enviarConsulta(){
    var placa = document.getElementById("placa").value;

    if(!placa){
        alert("Digite a placa");
        return;
    }

    // LOADING
    document.getElementById("conteudoBox").innerHTML = `
        <h2>Consultando...</h2>
        <p>Aguarde 🔍</p>
    `;

    try {
        const res = await fetch("https://SEU-LINK.onrender.com/consulta", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ placa })
        });

        if(!res.ok) throw new Error();

        const data = await res.json();

        const total = (
            parseFloat(data.debitos.multas) +
            parseFloat(data.debitos.ipva)
        ).toFixed(2);

        document.getElementById("conteudoBox").innerHTML = `
        <h2>Resultado</h2>

        <div class="result-card">
            <p>2024: R$ ${data.debitos.anuais[0].valor}</p>
            <p>2025: R$ ${data.debitos.anuais[1].valor}</p>
            <p>2026: R$ ${data.debitos.anuais[2].valor}</p>
        </div>

        <div class="result-card">
            <p>Multas: R$ ${data.debitos.multas}</p>
            <p>IPVA: R$ ${data.debitos.ipva}</p>
        </div>

        <div class="total">Total: R$ ${total}</div>

        <button class="btn btn-success" onclick="window.open('https://wa.me/5582991503881?text=Quero regularizar placa ${placa}')">
            Regularizar Agora
        </button>

        <button class="btn" onclick="location.reload()">Fechar</button>
        `;

    } catch {
        document.getElementById("conteudoBox").innerHTML = `
            <h2>Erro ❌</h2>
            <p>API não respondeu</p>
            <button onclick="location.reload()">Tentar novamente</button>
        `;
    }
}

// máscara placa
document.addEventListener("DOMContentLoaded", () => {
    const placa = document.getElementById("placa");
    placa.addEventListener("input", (e) => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
        if(v.length > 3){
            v = v.slice(0,3) + '-' + v.slice(3,7);
        }
        e.target.value = v;
    });
});
</script>

</body>
</html>
